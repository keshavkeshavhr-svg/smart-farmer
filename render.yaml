services:
  # Node.js Backend API
  - type: web
    name: smart-farmer-api
    env: node
    rootDir: server
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-farmer-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: smart-farmer-redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: CORS_ORIGIN
        value: https://your-vercel-app-url.vercel.app # TODO: Update this to your deployed Vercel frontend URL
      - key: JWT_SECRET
        generateValue: true
      # Add Razorypay, AWS, and Email keys in the Render Dashboard securely!

  # PostgreSQL Database
  - type: psql
    name: smart-farmer-db
    plan: free

  # Redis Instance
  - type: redis
    name: smart-farmer-redis
    plan: free
